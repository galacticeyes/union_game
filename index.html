<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Blood Abyss Survivor</title>
  <style>
    html, body { margin:0; padding:0; background:#0a0a0d; overflow:hidden; font-family: monospace; display:flex; justify-content:center; align-items:center; min-height:100vh; width:100vw; }
    #gameContainer { position:relative; display:block; }
    #gameContainer canvas { position:absolute; left:0; top:0; }
    #backCanvas { z-index:0; }
    #enemyOverlay { position:absolute; left:0; top:0; z-index:1; pointer-events:none; overflow:hidden; }
    #frontCanvas { z-index:2; background:transparent; }
    canvas { display:block; background:#111; image-rendering: pixelated; touch-action:none; }
    .gif-render-element { position:absolute; left:0; top:0; z-index:1; pointer-events:none; image-rendering: pixelated; }
  </style>
</head>
<body>
<div id="gameContainer">
<canvas id="backCanvas"></canvas>
<div id="enemyOverlay"></div>
<canvas id="frontCanvas"></canvas>
<img id="playerGif" class="gif-render-element" src="rouge_webps/player.webp" alt="" style="display:none;">
</div>
<script>
(() => {
  'use strict';
  const SHOW_SKILL_DEBUG = true;

  const MANIFEST = {
    physicsConfig: { speedBase:3.2, friction:0.86, knockback:220, pickupRadius:72 },
    assets: {
      Victor:{logicSize:{width:128,height:128}}, enemy_skeleton_marksman:{logicSize:{width:96,height:96}}, enemy_bloodthirsty_gargoyle:{logicSize:{width:96,height:96}}, enemy_toxic_ghoul:{logicSize:{width:96,height:96}}, enemy_common_undead_demon:{logicSize:{width:96,height:96}}, enemy_heavy:{logicSize:{width:192,height:192}}, enemy_flying:{logicSize:{width:96,height:96}}
    },
    levelConfig:{spawnWeights:{top:0.4,bottom:0.4,left:0.1,right:0.1}}
  };

  const PERF = { DT_MAX:0.04, TARGET_W:540, TARGET_H:960, BULLET_INTERVAL:2.2, BULLET_RANGE:520 };
  const COMBAT_TUNING = {
    maxSkillLv: 20,
    player: {
      baseHp: 520,
      baseLifeSteal: 0.11,
      regenPerTick: 0.8,
      maxHpUpgradeGain: 24,
      lifeStealPerLv: 0.008,
      movePerLv: 0.035,
      regenPerLv: 0.12,
      atkPerLv: 0.06
    },
    skillBaseDmg: 14,
    skillDmgMult: { slash: 1.0, dash: 1.25, arcane: 0.92 },
    enemyGrowth: {
      everySec: 20,
      hpPerStep: 0.095,
      dmgPerStep: 0.075
    },
    spawn: {
      intervalStart: 1.08,
      intervalMin: 0.40,
      intervalDropPerSec: 0.00135,
      flyingPackStep: 4
    },
    visual: {
      rangedEnemyScale: 1.5,
      rangedBulletScale: 64
    },
    dash: {
      widthBase: 56,
      widthPerLv: 5,
      lenBaseRatio: 0.55,
      lenPerLv: 20,
      spriteBase: 42,
      spritePerLv: 2.2,
      knockbackBase: 320,
      knockbackPerLv: 34,
      knockbackDurBase: 0.26,
      knockbackDurPerLv: 0.012
    },
    enemy: {
      melee: { hp: 48, contactDmg: 8, attackCd: 0.8 },
      ranged: { hp: 38, bulletDmg: 9, bulletInterval: 1.9 },
      heavy: { hp: 155, contactDmg: 17, attackCd: 2.55 },
      flying: { hp: 30, contactDmg: 7, attackCd: 0.72, packCount: 4 }
    }
  };
  const backCanvas = document.getElementById('backCanvas');
  const frontCanvas = document.getElementById('frontCanvas');
  const backCtx = backCanvas.getContext('2d');
  const ctx = frontCanvas.getContext('2d');
  const enemyOverlay = document.getElementById('enemyOverlay');
  const playerGifEl = document.getElementById('playerGif');
  const loadingState = { total:0, done:0, ready:false };
  function registerLoadingTask(taskPromise){
    loadingState.total++;
    Promise.resolve(taskPromise).catch(()=>{}).finally(()=>{
      loadingState.done++;
      if(loadingState.done>=loadingState.total) loadingState.ready=true;
    });
  }
  function waitImageAsset(img){
    return new Promise(resolve=>{
      if(img.complete) return resolve();
      img.addEventListener('load', resolve, {once:true});
      img.addEventListener('error', resolve, {once:true});
    });
  }
  const imgSlash = new Image();
  imgSlash.onload = () => { const b = getOpaqueBounds(imgSlash); if(b) opaqueBoundsCache.slash = b; };
  imgSlash.src = 'rouge_webps/player_sl_0.png';
  const imgDashThrust = new Image();
  imgDashThrust.onload = () => { const b = getOpaqueBounds(imgDashThrust); if(b) opaqueBoundsCache.dash = b; };
  imgDashThrust.src = 'rouge_webps/player_sl_1.webp';
  imgDashThrust.onerror = function(){ if(this.src.indexOf('.png')<0) this.src='rouge_webps/player_sl_1.png'; };
  const imgTilesBrown = [0,1,2,3,4].map(i => { const img = new Image(); img.src = `tile_0${i}_brown.png`; return img; });
  const PLAYER_WEBP_FPS = 12 * 0.8 * 0.8 * 0.5;
  const playerWebpState = { ready: false, frames: [], frameCount: 0, useImgFallback: false };
  const enemyAssetSrcs = ['rouge_webps/enemy_0.webp','rouge_webps/enemy_1.webp','rouge_webps/enemy_2.webp','rouge_webps/enemy_3.webp'];
  const enemyAttackSrcs = { melee: 'rouge_webps/enemy_attack_0.webp', heavy: 'rouge_webps/enemy_attack_2.webp' };
  const HEAVY_ATTACK_DUR = 1.0;
  let audioCtx = null;
  const footstepCooldown = { t: 0 };
  function ensureAudioCtx(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
  function playSound(type){
    try {
      const ctx = ensureAudioCtx();
      if(ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;
      const gainNode = ctx.createGain();
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(1200, now);
      gainNode.connect(lp);
      lp.connect(ctx.destination);
      if(type === 'slash'){
        gainNode.gain.setValueAtTime(0.06, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(360, now);
        o.frequency.exponentialRampToValueAtTime(90, now + 0.09);
        o.connect(gainNode); o.start(now); o.stop(now + 0.09);
      }else if(type === 'dash'){
        gainNode.gain.setValueAtTime(0.055, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(420, now);
        o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        o.connect(gainNode); o.start(now); o.stop(now + 0.1);
      }else if(type === 'arcane'){
        gainNode.gain.setValueAtTime(0.05, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(480, now);
        o.frequency.exponentialRampToValueAtTime(110, now + 0.08);
        o.connect(gainNode); o.start(now); o.stop(now + 0.08);
      }else if(type === 'footstep'){
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(90, now);
        osc.frequency.exponentialRampToValueAtTime(60, now + 0.05);
        osc.connect(gainNode);
        gainNode.gain.setValueAtTime(0.03, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        osc.start(now);
        osc.stop(now + 0.06);
      }else if(type === 'block'){
        gainNode.gain.setValueAtTime(0.045, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(520, now);
        o.frequency.exponentialRampToValueAtTime(120, now + 0.06);
        o.connect(gainNode); o.start(now); o.stop(now + 0.06);
      }else if(type === 'hit'){
        gainNode.gain.setValueAtTime(0.055, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(280, now);
        o.frequency.exponentialRampToValueAtTime(80, now + 0.07);
        o.connect(gainNode); o.start(now); o.stop(now + 0.07);
      }
    } catch (_) {}
  }
  function tryFootstep(stateTime, moving){
    if(!moving) return;
    if((footstepCooldown.t || 0) > stateTime) return;
    footstepCooldown.t = stateTime + 0.22;
    playSound('footstep');
  }
  function syncEnemyGif(e, typeIdx, ox, oy, faceRight, overrideSrc){
    if(!e.gifEl){
      e.gifEl = document.createElement('img');
      e.gifEl.className = 'gif-render-element';
      e.gifEl.style.position = 'absolute';
      e.gifEl.style.transformOrigin = '50% 50%';
      e.gifEl.style.imageRendering = 'pixelated';
      enemyOverlay.appendChild(e.gifEl);
      e.gifTypeIdx = -1;
    }
    const useSrc = overrideSrc || enemyAssetSrcs[typeIdx];
    const cacheKey = overrideSrc || typeIdx;
    if(e.gifTypeIdx !== cacheKey){ e.gifEl.src = useSrc; e.gifTypeIdx = cacheKey; }
    e.gifEl.style.display='block';
    const tx = (e.x + ox) * scale, ty = (e.y + oy) * scale, ew = e.w * scale, eh = e.h * scale;
    e.gifEl.style.width = Math.round(ew) + 'px';
    e.gifEl.style.height = Math.round(eh) + 'px';
    const flip = e.ranged ? !faceRight : faceRight;
    e.gifEl.style.transform = `translate(${Math.round(tx - ew/2)}px,${Math.round(ty - eh/2)}px) scaleX(${flip ? 1 : -1})`;
    e.gifEl.style.display = 'block';
  }
  const playerWebpLoadTask = (async () => {
    if (typeof ImageDecoder === 'undefined') { playerWebpState.useImgFallback = true; return; }
    try {
      const r = await fetch('rouge_webps/player.webp');
      if (!r.ok) { playerWebpState.useImgFallback = true; return; }
      const blob = await r.blob();
      const decoder = new ImageDecoder({ data: blob, type: 'image/webp' });
      await decoder.tracks.ready;
      const track = decoder.tracks.selectedTrack;
      if (!track.animated || track.frameCount === 0) { playerWebpState.useImgFallback = true; return; }
      const n = track.frameCount;
      for (let i = 0; i < n; i++) {
        const { image } = await decoder.decode({ frameIndex: i });
        playerWebpState.frames.push(await createImageBitmap(image));
        image.close();
      }
      playerWebpState.frameCount = n;
      playerWebpState.ready = true;
      const b = getOpaqueBounds(playerWebpState.frames[0]);
      if(b) opaqueBoundsCache.player = b;
    } catch (_) { playerWebpState.useImgFallback = true; }
  })();
  // START - Modification 1: Declare arcaneOrbImg
  const arcaneOrbImg = new Image();
  arcaneOrbImg.onload = () => { const b = getOpaqueBounds(arcaneOrbImg); if(b) opaqueBoundsCache.arcaneOrb = b; };
  arcaneOrbImg.src = 'rouge_webps/player_sl_2.webp';
  const enemyAttackImg = new Image();
  enemyAttackImg.src = 'rouge_webps/enemy_attack_1.webp';
  const heavyAttackImg = new Image();
  heavyAttackImg.src = 'rouge_webps/enemy_attack_2.webp';
  const meleeAttackImg = new Image();
  meleeAttackImg.src = 'rouge_webps/enemy_attack_0.webp';
  const meleeAttackFrames = { frames: [], frameCount: 0, ready: false };
  const heavyAttackFrames = { frames: [], frameCount: 0, ready: false };
  const enemyAttackFrameTask = (async () => {
    if (typeof ImageDecoder === 'undefined' || !ImageDecoder.isTypeSupported?.('image/webp')) return;
    for (const [fs, path] of [[meleeAttackFrames, 'rouge_webps/enemy_attack_0.webp'], [heavyAttackFrames, 'rouge_webps/enemy_attack_2.webp']]) {
      try {
        const r = await fetch(path);
        if (!r.ok) continue;
        const decoder = new ImageDecoder({ data: await r.blob(), type: 'image/webp' });
        await decoder.tracks.ready;
        if (decoder.completed) await decoder.completed;
        const track = decoder.tracks.selectedTrack;
        const n = (track && track.frameCount) || 0;
        if (n <= 0) continue;
        for (let i = 0; i < n; i++) {
          const { image } = await decoder.decode({ frameIndex: i });
          fs.frames.push(await createImageBitmap(image));
          image.close();
        }
        fs.frameCount = n;
        fs.ready = true;
      } catch (_) {}
    }
  })();
  playerGifEl.addEventListener('load', () => {
    if(!opaqueBoundsCache.player){ const b = getOpaqueBounds(playerGifEl); if(b) opaqueBoundsCache.player = b; }
  });
  if(playerGifEl.complete && playerGifEl.naturalWidth && !opaqueBoundsCache.player){
    const b = getOpaqueBounds(playerGifEl); if(b) opaqueBoundsCache.player = b;
  }
  registerLoadingTask(playerWebpLoadTask);
  registerLoadingTask(enemyAttackFrameTask);
  for(const img of [imgSlash,imgDashThrust,...imgTilesBrown,arcaneOrbImg,enemyAttackImg,heavyAttackImg,meleeAttackImg,playerGifEl]){
    registerLoadingTask(waitImageAsset(img));
  }
  // END - Modification 1
  let vw=PERF.TARGET_W, vh=PERF.TARGET_H, scale=1;
  function resize(){
    const w=window.innerWidth,h=window.innerHeight;
    scale=Math.min(w/PERF.TARGET_W,h/PERF.TARGET_H);
    const cw=Math.floor(PERF.TARGET_W*scale), ch=Math.floor(PERF.TARGET_H*scale);
    backCanvas.width=frontCanvas.width=cw; backCanvas.height=frontCanvas.height=ch;
    const container=document.getElementById('gameContainer');
    if(container){ container.style.width=cw+'px'; container.style.height=ch+'px'; }
    if(enemyOverlay){ enemyOverlay.style.width=cw+'px'; enemyOverlay.style.height=ch+'px'; }
    vw=PERF.TARGET_W; vh=PERF.TARGET_H;
    backCtx.setTransform(scale,0,0,scale,0,0);
    ctx.setTransform(scale,0,0,scale,0,0);
  }
  function renderLoading(){
    backCtx.fillStyle='#0b0f12';
    backCtx.fillRect(0,0,vw,vh);
    ctx.save();
    ctx.setTransform(scale,0,0,scale,0,0);
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.fillRect(0,0,vw,vh);
    const p = loadingState.total>0 ? loadingState.done/loadingState.total : 0;
    const bw=280, bh=16, bx=(vw-bw)/2, by=vh/2+20;
    ctx.fillStyle='#fff';
    ctx.fillText('Loading assets...', vw/2-62, vh/2-8);
    rect(bx,by,bw,bh,'#2a2a2a');
    rect(bx,by,bw*clamp(p,0,1),bh,'#49f38f');
    ctx.fillStyle='#d6ffe6';
    ctx.fillText(`${Math.floor(clamp(p,0,1)*100)}%`, vw/2-10, by+30);
    ctx.restore();
  }
  window.addEventListener('resize',resize); resize();

  const world={w:2400,h:2400};
  const keys={};
  const isTouchDevice = (navigator.maxTouchPoints||0) > 0;
  const touchMove = { active:false, id:null, startX:0, startY:0, dirX:0, dirY:0, maxR:64 };
  function resetTouchMove(){ touchMove.active=false; touchMove.id=null; touchMove.dirX=0; touchMove.dirY=0; }
  function updateTouchMoveFromEvent(ev){
    if(!touchMove.active) return;
    const t=[...ev.changedTouches].find(tt=>tt.identifier===touchMove.id) || [...ev.touches].find(tt=>tt.identifier===touchMove.id);
    if(!t) return;
    const r=frontCanvas.getBoundingClientRect();
    const x=(t.clientX-r.left)/scale, y=(t.clientY-r.top)/scale;
    const dx=x-touchMove.startX, dy=y-touchMove.startY;
    const len=Math.hypot(dx,dy);
    if(len<=1e-6){ touchMove.dirX=0; touchMove.dirY=0; return; }
    const cap=Math.min(1,len/touchMove.maxR);
    touchMove.dirX=(dx/len)*cap;
    touchMove.dirY=(dy/len)*cap;
  }
  window.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    keys[k]=true;
    if(k==='h') state.showCollBox = !state.showCollBox;
    if(k==='c') state.showCenterDebug = !state.showCenterDebug; // CENTER_LOCK_FIX_V3
    if(state.paused&&['1','2','3'].includes(e.key)) chooseUpgrade(+e.key-1);
    if(state.dead&&k==='r') restart();
  });
  window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
  frontCanvas.addEventListener('touchstart', (e)=>{
    if(state.paused||state.dead) return;
    if(touchMove.active) return;
    const t=e.changedTouches[0];
    const r=frontCanvas.getBoundingClientRect();
    const x=(t.clientX-r.left)/scale, y=(t.clientY-r.top)/scale;
    if(x>vw*0.55) return; // left side joystick
    touchMove.active=true; touchMove.id=t.identifier; touchMove.startX=x; touchMove.startY=y; touchMove.dirX=0; touchMove.dirY=0;
    e.preventDefault();
  }, {passive:false});
  frontCanvas.addEventListener('touchmove', (e)=>{
    updateTouchMoveFromEvent(e);
    if(touchMove.active) e.preventDefault();
  }, {passive:false});
  frontCanvas.addEventListener('touchend', (e)=>{
    const ended=[...e.changedTouches].some(t=>t.identifier===touchMove.id);
    if(ended) resetTouchMove();
  }, {passive:true});
  frontCanvas.addEventListener('touchcancel', ()=>resetTouchMove(), {passive:true});
  frontCanvas.addEventListener('click', (e)=>{ if(!state.paused) return; const r=frontCanvas.getBoundingClientRect(); const x=(e.clientX-r.left)/scale, y=(e.clientY-r.top)/scale; for(let i=0;i<state.cards.length;i++){const c=state.cards[i]; if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h) chooseUpgrade(i);} if(state.dead){const b=state.restartBtn; if(x>=b.x&&b.x+b.w&&y>=b.y&&y<=b.y+b.h) restart();}});

  // 透明图/动图碰撞体积：仅非透明部分。从图像提取不透明像素的边界框。
  const opaqueBoundsCache = { player: null, arcaneOrb: null, slash: null, dash: null };
  function getOpaqueBounds(source, alphaThreshold){
    const w = source.width || source.naturalWidth || 0;
    const h = source.height || source.naturalHeight || 0;
    if(!w||!h) return null;
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const cx = c.getContext('2d');
    cx.drawImage(source, 0, 0);
    const data = cx.getImageData(0, 0, w, h).data;
    const th = alphaThreshold != null ? alphaThreshold : 16;
    let left = w, top = h, right = 0, bottom = 0;
    for(let y = 0; y < h; y++)
      for(let x = 0; x < w; x++){
        if(data[(y*w+x)*4+3] >= th){
          if(x < left) left = x;
          if(x > right) right = x;
          if(y < top) top = y;
          if(y > bottom) bottom = y;
        }
      }
    if(left > right || top > bottom) return null;
    return { left, top, right: right+1, bottom: bottom+1, iw: w, ih: h };
  }
  function worldBoxFromOpaqueBounds(ob, entityX, entityY, entityW, entityH){
    if(!ob) return null;
    const sx = entityW / ob.iw, sy = entityH / ob.ih;
    return {
      x: entityX - entityW/2 + ob.left * sx,
      y: entityY - entityH/2 + ob.top * sy,
      w: (ob.right - ob.left) * sx,
      h: (ob.bottom - ob.top) * sy
    };
  }
  const HITBOX_SCALE = 0.72;
  const HITBOX_SCALE_FLYING = 0.58 * 0.25;
  function hbBottomThird(e){
    if(e.isPlayer && opaqueBoundsCache.player){
      const box = worldBoxFromOpaqueBounds(opaqueBoundsCache.player, e.x, e.y, e.w, e.h);
      if(box) return box;
    }
    const w = e.flying ? e.w * HITBOX_SCALE_FLYING : e.w * HITBOX_SCALE;
    const h = e.flying ? e.h * HITBOX_SCALE_FLYING : e.h * HITBOX_SCALE;
    if(!e.flying){
      const nw = w/2, nh = h/2, bottom = e.y + h/2;
      return {x:e.x-nw/2, y:bottom-nh, w:nw, h:nh};
    }
    return {x:e.x-w/2,y:e.y-h/2,w,h};
  }
  function overlap(a,b){ return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y; }
  function spawnHeavyExplosion(e){
    const b=heavyAttackBox(e,state.player);
    const cells=[];
    const cellSize=8;
    const cols=Math.max(2,Math.floor(b.w/cellSize));
    const rows=Math.max(2,Math.floor(b.h/cellSize));
    for(let gy=0;gy<rows;gy++){
      for(let gx=0;gx<cols;gx++){
        const px=b.x+gx*cellSize;
        const py=b.y+gy*cellSize;
        const seed=Math.random()*1000;
        const threshold=0.42 + (gy/rows)*0.25;
        if(Math.random()<threshold){
          cells.push({x:px,y:py,s:cellSize,seed});
        }
      }
    }
    return {box:b,cells,t:HEAVY_ATTACK_DUR,life:HEAVY_ATTACK_DUR};
  }
  function drawEnemyAttackZone(e, p, ox, oy){
    ctx.save();
    ctx.strokeStyle='rgba(255,100,80,0.7)';
    ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    if(e.heavy){
      const b=heavyAttackBox(e,p);
      ctx.strokeRect(b.x+ox,b.y+oy,b.w,b.h);
    }else{
      const b=meleeAttackBox(e);
      ctx.strokeRect(b.x+ox,b.y+oy,b.w,b.h);
    }
    ctx.setLineDash([]);
    ctx.restore();
  }
  function drawFlyingClawFx(cf, ox, oy){
    for(const pt of (cf.particles||[])){
      const lifeLeft=1-Math.min(1,pt.age/(pt.life||0.3));
      if(lifeLeft<=0) continue;
      const r=pt.r||200, g=20, b=30;
      ctx.fillStyle=`rgba(${r},${g},${b},${lifeLeft*0.9})`;
      const s=Math.max(1,Math.round(pt.size*lifeLeft));
      ctx.fillRect(Math.floor(pt.x+ox)-s/2,Math.floor(pt.y+oy)-s/2,s,s);
    }
  }
  function drawSpikeKnockFx(sf, ox, oy){
    for(const pt of (sf.particles||[])){
      const lifeLeft=1-Math.min(1,pt.age/(pt.life||0.3));
      if(lifeLeft<=0) continue;
      const s=Math.max(2,Math.round(pt.size*lifeLeft));
      const col = pt.col || [140,255,170];
      const core = pt.core || [255,240,120];
      const x=Math.floor(pt.x+ox)-s/2;
      const y=Math.floor(pt.y+oy)-s/2;

    const ax=aBox.x+aBox.w*0.5, ay=aBox.y+aBox.h*0.5;

  function resolvePlayerEnemyPass(player,enemies,inputVX,inputVY){

            const id=i+'_'+j;
            if(checked.has(id)) continue;

            const a=enemies[i], b=enemies[j];
            if(resolvePairElastic(a,b)){

  function getNearestEnemyToPoint(x, y){

    return best;
  }

  function applyOrbHoming(orb, dt){
    if(!orb) return;
    const EPS = COLLISION_SAFE.EPS;
    const speedNow = Math.hypot(safeFinite(orb.vx,0), safeFinite(orb.vy,0));
    if(speedNow <= EPS) return;

    let target = resolveOrbTarget(orb);
    if(!target){
      target = getNearestEnemyToPoint(safeFinite(orb.x,0), safeFinite(orb.y,0));
      if(target){
        orb.targetRef = target;
        orb.targetId = getEnemyId(target);
        orb.retargets = (orb.retargets||0) + 1;
        state.orbRetargets = (state.orbRetargets||0) + 1;
      }
    }
    if(!target) return;

    const tx = safeFinite(target.x, NaN), ty = safeFinite(target.y, NaN);
    if(!Number.isFinite(tx) || !Number.isFinite(ty)) return;

    const dx = tx - orb.x, dy = ty - orb.y;
    const dLen = Math.hypot(dx,dy);
    if(dLen <= EPS) return;
    const dirDx = dx / dLen, dirDy = dy / dLen;

    const cvx = orb.vx / speedNow, cvy = orb.vy / speedNow;
    const hs = clamp(orb.homingStrength||9, 0, 64);
    let steer = clamp(hs * dt, 0, 1);
    if(Number.isFinite(orb.turnRateClamp) && orb.turnRateClamp>0){
      steer = Math.min(steer, orb.turnRateClamp * dt);
    }

    let nx = cvx + (dirDx - cvx) * steer;
    let ny = cvy + (dirDy - cvy) * steer;
    const nLen = Math.hypot(nx,ny);
    if(nLen > EPS){
      nx /= nLen; ny /= nLen;
      orb.vx = nx * speedNow;
      orb.vy = ny * speedNow;
    }
  }

  function pickWeightedUniqueAtk(atkSource, pickCount){
    const pool = atkSource.slice();

      for(let j=0; j<pool.length; j++) total += pool[j].weight;
      let r=Math.random()*total;
      let idx=0;
      for(; idx<pool.length; idx++){

        if(r<=0) break;

  const SLASH_SPRITE_W = 144; // 1.5x slash sprite size
  const SLASH_SPRITE_H = 144; // 1.5x slash sprite size
  function drawAxePixel(centerX, centerY, tangentAngle, alpha){
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(tangentAngle);
    ctx.globalAlpha = alpha;
    if(imgSlash.complete && imgSlash.naturalWidth){
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(imgSlash, -SLASH_SPRITE_W/2, -SLASH_SPRITE_H/2, SLASH_SPRITE_W, SLASH_SPRITE_H);
    } else {
      rect(-10, -2, 14, 4, '#7a5a3a');
      rect(2, -6, 8, 12, '#d9dde5');
      rect(8, -5, 5, 10, '#b5bdc9');
      rect(-12, -1, 3, 2, '#b08a62');
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function drawSlashFx(s, ox, oy){
    const p = state.player;
    const pose = getSlashPose(s, p);
    drawAxePixel(pose.ax + ox, pose.ay + oy, pose.tangent, 1);
  }

  function drawArcaneFx(pr, ox, oy){
    const p = 1 - (pr.t/Math.max(0.001,pr.life||0.7));
    const f = (p*4)|0;
    const jx = Math.sin((state.time*30)+(pr.seed||0))*2;
    const jy = Math.cos((state.time*26)+(pr.seed||0))*2;
    const x = pr.x + ox + jx, y = pr.y + oy + jy;

    // START - Modification 2: Replace pixel art with image and rotate
    const angle = Math.atan2(pr.vy, pr.vx); // Calculate rotation based on velocity

    ctx.save(); // Save current canvas state
    ctx.translate(x, y); // Move origin to orb center

    // The user states "奥数弹的方向是竖直向下的，要与奥数弹的飞行方向对齐".
    // Assuming the image `player_sl_2.png` naturally points downwards (along its local +Y axis).
    // `Math.atan2(vy, vx)` gives the angle from the positive X-axis (right).
    // To align the image\'s natural downward direction (local +Y, which is PI/2 from local +X) with the velocity angle,
    // we need to apply a rotation of `angle - PI/2`.
    ctx.rotate(angle - Math.PI / 2); // Rotate to align with velocity.

    const playerSize = MANIFEST.assets.Victor.logicSize.width; // 128
    const orbScale = playerSize / 6 * 4; // 奥数弹大小为玩家的 1/6 的 4 倍
    const imgWidth = 16 * (orbScale / 32);  // 图片 16x32，按比例缩放使高=orbScale
    const imgHeight = orbScale;

    if (arcaneOrbImg.complete && arcaneOrbImg.naturalWidth > 0) {
      // Draw the image centered around the new origin (x, y)
      ctx.drawImage(arcaneOrbImg, -imgWidth / 2, -imgHeight / 2, imgWidth, imgHeight);
    } else {
      // Fallback to original pixel drawing if image not loaded or failed
      const core = ([6,7,5,4][Math.min(3,f)]) * orbScale / 16;
      rect(-core/2, -core/2, core, core,'#7ef'); // main body
      rect(-core, -orbScale/8, core*2, orbScale/4,'rgba(120,220,255,0.8)'); // horizontal glow
      if(f>=1) rect(-orbScale/8, -core, orbScale/4, core*2,'rgba(180,240,255,0.8)'); // vertical glow
      if(f>=2) rect(-core-orbScale/4, -core-orbScale/4, orbScale*3/8, orbScale*3/8,'rgba(80,140,255,0.8)'); // corner 1
      if(f>=3) rect(core-orbScale/8, core-orbScale/8, orbScale*3/8, orbScale*3/8,'rgba(210,250,255,0.9)'); // corner 2
    }

    ctx.restore(); // Restore canvas state
    // END - Modification 2
  }

  function drawMeleeAttackFx(m, ox, oy){
    const x=m.x+ox, y=m.y+oy;
    const angle=Math.atan2(m.dirY,m.dirX);
    const sz=72;
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    const phase=1-(m.t/(m.life||0.35));
    ctx.globalAlpha=phase<0.2?phase/0.2:phase>0.8?(1-phase)/0.2:1;
    if(meleeAttackImg.complete&&meleeAttackImg.naturalWidth>0){
      ctx.imageSmoothingEnabled=false;
      ctx.drawImage(meleeAttackImg,-sz/2,-sz/2,sz,sz);
    }else{ rect(-18,-18,36,36,'rgba(180,100,80,0.8)'); }
    ctx.restore();
  }
  function drawHeavyExplosionFx(hx, ox, oy){
    const life=(hx.life||HEAVY_ATTACK_DUR||0.5);
    const p=1-Math.max(0,(hx.t||0)/life);
    if(p<0||p>1) return;
    const cells=Array.isArray(hx.cells)?hx.cells:[];
    if(!cells.length) return;
    const alpha=1-p;
    ctx.save();
    for(const c of cells){
      const flame=Math.sin((state.time*18)+(c.seed||0))*0.5+0.5;
      const front = p<0.5 ? (p/0.5) : 1;
      if(p<0.5 && flame<0.72) continue; // sparser flames in first half
      const h=Math.floor(c.s*(0.45+flame*0.45)*(0.75+front*0.35));
      const baseX=c.x+ox;
      const baseY=c.y+oy+(c.s-h);
      ctx.fillStyle=`rgba(170,40,12,${(0.28+0.35*front)*alpha})`;
      rect(baseX, baseY, c.s, h);
      ctx.fillStyle=`rgba(245,120,26,${(0.36+0.36*front)*alpha})`;
      rect(baseX+1, baseY+1, Math.max(1,c.s-2), Math.max(1,h-2));
      if(flame>0.6){
        ctx.fillStyle=`rgba(255,228,120,${(0.28+0.5*front)*alpha})`;
        rect(baseX+2, baseY+2, Math.max(1,c.s-4), Math.max(1,h*0.45));
      }
    }
    ctx.restore();
  }
  function drawHeavyAttackFx(h, ox, oy){
    const x=h.x+ox, y=h.y+oy;
    const angle=Math.atan2(h.dirY,h.dirX);
    const sz=96;
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    const phase=1-(h.t/(h.life||0.4));
    ctx.globalAlpha=phase<0.2?phase/0.2:phase>0.8?(1-phase)/0.2:1;
    if(heavyAttackImg.complete&&heavyAttackImg.naturalWidth>0){
      ctx.imageSmoothingEnabled=false;
      ctx.drawImage(heavyAttackImg,-sz/2,-sz/2,sz,sz);
    }else{ rect(-24,-24,48,48,'rgba(200,80,60,0.8)'); }
    ctx.restore();
  }
  function drawEnemyBulletFx(b, ox, oy){
    const x = b.x + ox, y = b.y + oy;
    const angle = Math.atan2(b.vy, b.vx);
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle - Math.PI / 2);
    const bulletScale = COMBAT_TUNING.visual.rangedBulletScale;
    const imgW = 16 * (bulletScale / 32), imgH = bulletScale;
    if(enemyAttackImg.complete && enemyAttackImg.naturalWidth > 0){
      ctx.drawImage(enemyAttackImg, -imgW/2, -imgH/2, imgW, imgH);
    } else {
      rect(-3,-3,6,6,'#ffdd55');
    }
    ctx.restore();
  }
  function drawActorShadow(x, y, w, h, alpha=0.26){
    ctx.save();
    ctx.fillStyle=`rgba(0,0,0,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(x, y + h*0.38, w*0.28, h*0.12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function getEnemyTypeIndex(e){ if(e.heavy) return 2; if(e.flying) return 3; if(e.ranged) return 1; return 0; }

  const DASH_SPRITE_SZ = 48;
  const DASH_SPRITE_CYCLE = 0.5;
  const DASH_SPRITE_INTERVAL = 0.1/1.5;
  function drawThrustFx(d, ox, oy){
    const life = d.life||0.5, maxLen = d.maxLen||360;
    const progress = 1 - (d.t/Math.max(0.001,life));
    const currLen = progress * maxLen;
    const timeElapsed = progress * life;
    const gap = maxLen * DASH_SPRITE_INTERVAL / life;
    const count = Math.max(1, Math.floor(currLen / gap));
    const sx = d.startX + ox, sy = d.startY + oy;
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    for(let i = 0; i < count; i++){
      const age = timeElapsed - i * DASH_SPRITE_INTERVAL;
      if(age < 0) continue;
      const phase = Math.min(1, age / DASH_SPRITE_CYCLE);
      let scale = 1, alpha = 1, offsetY = 0;
      if(phase < 0.33){
        const p = phase / 0.33;
        scale = p;
        alpha = p;
        offsetY = (1 - p) * 24;
      } else if(phase < 0.66){
        scale = 1;
        alpha = 1;
      } else {
        const p = (phase - 0.66) / 0.34;
        alpha = 1 - p;
        scale = 1 - p * 0.3;
      }
      if(alpha <= 0) continue;
      const dist = (i + 0.5) * gap;
      const px = sx + d.dirX * dist;
      const py = sy + d.dirY * dist;
      ctx.save();
      ctx.translate(px, py);
      ctx.translate(0, offsetY);
      ctx.globalAlpha = alpha;
      const baseSpriteSize = d.spriteSize || DASH_SPRITE_SZ;
      const sz = baseSpriteSize * scale;
      if(imgDashThrust.complete && imgDashThrust.naturalWidth > 0){
        ctx.drawImage(imgDashThrust, -sz/2, -sz/2, sz, sz);
      } else {
        rect(-sz/4, -sz/4, sz/2, sz/2, 'rgba(255,170,140,0.9)');
      }
      ctx.restore();
    }
    ctx.restore();
  }

  function render(){
    const ox=-state.cam.x, oy=-state.cam.y;
    backCtx.fillStyle='#0d0f14'; backCtx.fillRect(0,0,vw,vh);
    const T=120; const sx=Math.floor(state.cam.x/T)*T; const sy=Math.floor(state.cam.y/T)*T;
    for(let y=sy;y<state.cam.y+vh+T;y+=T) for(let x=sx;x<state.cam.x+vw+T;x+=T){
      const gx=Math.floor(x/T), gy=Math.floor(y/T);
      const h=((gx*2654435761)^(gy*2246822519))>>>0;
      const idx=h%5;
      const img=imgTilesBrown[idx];
      if(img.complete&&img.naturalWidth) backCtx.drawImage(img,x+ox,y+oy,T,T);
      else{ backCtx.fillStyle='#141821'; backCtx.fillRect(x+ox,y+oy,T-2,T-2); }
    }
    // hide landmark blocks to keep battlefield clean
    ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,frontCanvas.width,frontCanvas.height); ctx.restore();
    const p=state.player;
    if(state.showCollBox){ const ph=hbBottomThird(p); rect(ph.x+ox,ph.y+oy,ph.w,ph.h,'rgba(0,255,255,0.25)'); }
    for(const e of (state.enemies||[])) drawActorShadow(e.x+ox, e.y+oy, e.w, e.h, 0.24);
    for(const e of (state.enemies||[])){
      const idx=getEnemyTypeIndex(e);
      const faceRight=p.x>e.x;
      const inAttack = (e.heavy || (!e.ranged && !e.flying)) && (e.attackAnimUntil||0)>(state.time||0);
      if(inAttack){
        const fs=e.heavy?heavyAttackFrames:meleeAttackFrames;
        if(fs.ready&&fs.frameCount>0){
          const dur=e.heavy?HEAVY_ATTACK_DUR:0.5;
          const elapsed=Math.max(0,dur-((e.attackAnimUntil||0)-(state.time||0)));
          const frameIdx=Math.min(Math.floor(elapsed/dur*fs.frameCount),fs.frameCount-1);
          const bm=fs.frames[Math.max(0,frameIdx)];
          if(bm){
            ctx.save();
            ctx.imageSmoothingEnabled=false;
            const x=e.x+ox,y=e.y+oy;
            ctx.translate(x,y);
            ctx.scale(faceRight?1:-1,1);
            ctx.drawImage(bm,-e.w/2,-e.h/2,e.w,e.h);
            ctx.restore();
            if(e.gifEl) e.gifEl.style.display='none';
          }else{
            // Fallback when decoded frame is missing: keep attack gif visible.
            syncEnemyGif(e,idx,ox,oy,faceRight, e.heavy?enemyAttackSrcs.heavy:enemyAttackSrcs.melee);
          }
        }else{ syncEnemyGif(e,idx,ox,oy,faceRight, e.heavy?enemyAttackSrcs.heavy:enemyAttackSrcs.melee); }
      }else{ syncEnemyGif(e, idx, ox, oy, faceRight); }
    }
    for(const e of (state.enemies||[])){
      const maxHp = Math.max(1, e.maxHp || e.hp || 1);
      const hpRatio = (e.hp || 0) / maxHp;
      const barW = e.heavy ? 64 : 40;
      const barH = 5;
      const bx = e.x + ox - barW/2;
      const by = e.y + oy - e.h/2 - 12;
      drawHpBar(bx, by, barW, barH, hpRatio, '#e44747');
      ctx.fillStyle='#f5f5f5';
      ctx.fillText(`Lv${e.enemyLv||1}`, bx, by-3);
    }
    if(state.showCollBox){
      for(const e of (state.enemies||[])){ const h=hbBottomThird(e); rect(h.x+ox,h.y+oy,h.w,h.h,'rgba(255,255,255,0.2)'); }
      for(const e of (state.enemies||[])){ if(e.heavy||(!e.ranged&&!e.flying)||e.flying) drawEnemyAttackZone(e,p,ox,oy); }
    }

    if(state.showCollBox){
      const pcb=getCollisionBox(p);
      ctx.strokeStyle='#00ff88'; ctx.lineWidth=1; ctx.strokeRect(Math.round(pcb.x+ox),Math.round(pcb.y+oy),Math.round(pcb.w),Math.round(pcb.h));
      for(const e of (state.enemies||[])){
        const cb=getCollisionBox(e);
        ctx.strokeStyle='#ffd200'; ctx.strokeRect(Math.round(cb.x+ox),Math.round(cb.y+oy),Math.round(cb.w),Math.round(cb.h));
      }
    }

    for(const b of (state.enemyBullets||[])) drawEnemyBulletFx(b,ox,oy);
    for(const hx of (state.heavyExplosions||[])) drawHeavyExplosionFx(hx,ox,oy);
    for(const cf of (state.flyingClawFx||[])) drawFlyingClawFx(cf,ox,oy);
    for(const sf of (state.spikeFx||[])) drawSpikeKnockFx(sf,ox,oy);
    for(const bf of (state.blockFx||[])) drawBlockFx(bf,ox,oy);
    for(const xd of (state.xpDrops||[])) drawXpDrop(xd,ox,oy);
    for(const xf of (state.xpFlyFx||[])) drawXpFlyFx(xf,ox,oy);
    for(const s of (state.slashes||[])) drawSlashFx(s,ox,oy);
    for(const pr of (state.proj||[])) drawArcaneFx(pr,ox,oy);
    for(const d of (state.dashFx||[])) drawThrustFx(d,ox,oy);

    // 玩家绘制（放在最后以显示在敌人/特效之上；ImageDecoder 每轮跳过前两帧）
    const faceLeft = (p.lastFacing && p.lastFacing.x < 0);
    const px = p.x+ox-p.w/2, py = p.y+oy-p.h/2;
    drawActorShadow(p.x+ox, p.y+oy, p.w, p.h, 0.28);
    if (playerWebpState.ready && playerWebpState.frames.length > 0) {
      const idx = Math.floor(state.time * PLAYER_WEBP_FPS) % playerWebpState.frameCount;
      const bm = playerWebpState.frames[idx];
      if (bm) {
        ctx.save();
        ctx.translate(px + p.w/2, py + p.h/2);
        ctx.scale(faceLeft ? -1 : 1, 1);
        ctx.translate(-(px + p.w/2), -(py + p.h/2));
        ctx.drawImage(bm, px, py, p.w, p.h);
        ctx.restore();
      }
      playerGifEl.style.display = 'none';
    } else if (playerWebpState.useImgFallback && playerGifEl.complete && playerGifEl.naturalWidth) {
      const tx = px*scale, ty = py*scale, pw=p.w*scale, ph=p.h*scale;
      playerGifEl.style.display = 'block';
      playerGifEl.style.opacity = '1';
      playerGifEl.style.width = Math.round(pw)+'px';
      playerGifEl.style.height = Math.round(ph)+'px';
      playerGifEl.style.transformOrigin = '50% 50%';
      playerGifEl.style.transform = `translate(${Math.round(tx)}px,${Math.round(ty)}px) scaleX(${faceLeft?-1:1})`;
    } else {
      playerGifEl.style.display = 'none';
      rect(px, py, p.w, p.h, '#3aa7ff');
    }

    const topBarW = 320;
    const topBarH = 14;
    const topBarX = (vw - topBarW) / 2;
    const topBarY = 10;
    drawHpBar(topBarX, topBarY, topBarW, topBarH, p.hp/Math.max(1,p.maxHp), '#36d26b');
    const xpBar = getXpBarRect();
    drawHpBar(xpBar.x, xpBar.y, xpBar.w, xpBar.h, state.xp/Math.max(1,state.xpNeed), '#f0be42', 'rgba(35,28,16,0.78)', 'rgba(255,230,150,0.85)');
    ctx.fillStyle = '#fff';
    ctx.fillText(`HP ${Math.ceil(p.hp)}/${Math.ceil(p.maxHp)}  LV ${state.level}`, topBarX + 70, topBarY + topBarH + 14);
    ctx.fillText(`XP ${state.xp}/${state.xpNeed}`, xpBar.x + 118, xpBar.y + xpBar.h + 14);

    rect(10,10,360,178,'rgba(0,0,0,0.35)');
    ctx.fillStyle='#fff';
    ctx.fillText(`主动: 斩击${p.skills.slash}  突刺${p.skills.dash}  奥术弹${p.skills.arcane}`,20,68);
    ctx.fillText(`被动: 吸血${p.lifeStealLv}  血量${p.maxHpLv}  移速${p.moveLv}`,20,88);
    ctx.fillText(`      恢复${p.regenLv}  攻击${p.atkLv}  格挡${p.blockLv||0}`,20,106);
    ctx.fillText(`吸血率 ${(p.lifeSteal*100).toFixed(1)}%  格挡率 ${(clamp(0.06+(p.blockLv||0)*0.022,0,0.52)*100).toFixed(1)}%`,20,126);
    ctx.fillText(`击杀: 总${state.kills}  近${state.killStats.melee}  远${state.killStats.ranged}`,20,146);
    ctx.fillText(`      重${state.killStats.heavy}  飞${state.killStats.flying}`,20,164);

    if(isTouchDevice && !state.paused && !state.dead){
      const bx=82, by=vh-96, br=56;
      ctx.strokeStyle='rgba(255,255,255,0.24)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.stroke();
      const kx=bx+(touchMove.dirX||0)*br, ky=by+(touchMove.dirY||0)*br;
      ctx.fillStyle='rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.arc(kx,ky,22,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.fillText('MOVE', bx-18, by+4);
    }

    if(state.paused&&!state.dead){
      rect(0,0,vw,vh,'rgba(0,0,0,0.45)');
      ctx.fillStyle='#fff';
      ctx.fillText('PAUSED - 选择升级(1/2/3或点击)',130,250);
      for(let i=0;i<state.cards.length;i++){
        const c=state.cards[i];
        let theme='#2f2f3f';
        if(c.opt.kind==='atk'){
          if(c.opt.key==='slash') theme='#5d2c2c';
          else if(c.opt.key==='dash') theme='#5b3f21';
          else if(c.opt.key==='arcane') theme='#203d63';
        }else{
          if(c.opt.key==='lifeStealLv') theme='#234d2c';
          else if(c.opt.key==='maxHpLv') theme='#3f3320';
          else if(c.opt.key==='moveLv') theme='#1f3f3f';
          else if(c.opt.key==='regenLv') theme='#2a4a2a';
          else if(c.opt.key==='atkLv') theme='#4f2f1d';
          else if(c.opt.key==='blockLv') theme='#5b5423';
        }
        rect(c.x,c.y,c.w,c.h,'#222');
        rect(c.x+2,c.y+2,c.w-4,c.h-4,theme);
        ctx.fillStyle='#fff';
        ctx.fillText(`${i+1}. ${c.opt.name}`,c.x+10,c.y+30);
        ctx.fillText(c.opt.kind==='atk'?'主动技能':'被动技能',c.x+10,c.y+50);
        const lines = c.preview || [];
        for(let li=0;li<lines.length;li++){
          ctx.fillStyle = li===0 ? '#ffd36a' : '#d8efff';
          ctx.fillText(lines[li], c.x+10, c.y+74+li*18);
        }
      }
    }
    if(state.dead){ rect(80,220,380,420,'rgba(0,0,0,0.72)'); ctx.fillStyle='#fff'; ctx.fillText('YOU DIED',230,270); ctx.fillText(`击杀: ${state.kills}`,170,320); ctx.fillText(`等级: ${state.level}`,170,350); ctx.fillText(`斩击:${p.skills.slash} 突刺:${p.skills.dash} 奥术弹:${p.skills.arcane}`,170,380); const b=state.restartBtn; rect(b.x,b.y,b.w,b.h,'#7a1'); ctx.fillStyle='#fff'; ctx.fillText('RESTART (R)',b.x+28,b.y+27); }
    ctx.fillStyle='#aaa'; ctx.fillText(`diag paused=${state.paused} dead=${state.dead}`,10,vh-10);
  }

  (function bindChoiceListenersOnce(){
    choicePerfStats.bindCount += 1;
    if(CHOICE_DEBUG) console.log(`[choice] listeners bound count=${choicePerfStats.bindCount}`);
  })();

  requestAnimationFrame(loop);
})();
</script>
